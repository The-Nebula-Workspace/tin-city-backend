name: Notifications
description: |-

  APIs for managing push notifications
  Base URL: `/api/v1/notifications`
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/notifications/test
    metadata:
      custom: []
      groupName: Notifications
      groupDescription: |-

        APIs for managing push notifications
        Base URL: `/api/v1/notifications`
      subgroup: ''
      subgroupDescription: ''
      title: 'Send a Test Notification'
      description: 'This endpoint sends a push notification to a device using Firebase Cloud Messaging (FCM).'
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      token:
        custom: []
        name: token
        description: 'The FCM device token.'
        required: true
        example: '"dYV1S2A4-abc123xyz"'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      title:
        custom: []
        name: title
        description: 'The title of the notification.'
        required: true
        example: '"Reward Earned"'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      body:
        custom: []
        name: body
        description: 'The notification message body.'
        required: true
        example: '"You received 50 bonus points!"'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      type:
        custom: []
        name: type
        description: 'optional The type of notification. Must be one of: reward, route_update, admin_alert.'
        required: false
        example: '"reward"'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
    cleanBodyParameters:
      token: '"dYV1S2A4-abc123xyz"'
      title: '"Reward Earned"'
      body: '"You received 50 bonus points!"'
      type: '"reward"'
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": "Notification sent successfully!",
            "response": {
              "name": "projects/.../messages/12345"
            }
          }
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: |-
          {
            "success": false,
            "message": "Validation failed",
            "errors": {
              "token": ["The token field is required."]
            }
          }
        headers: []
        description: 'Validation Error'
      -
        custom: []
        status: 500
        content: |-
          {
            "success": false,
            "message": "Failed to send notification.",
            "errors": "Server error message"
          }
        headers: []
        description: 'Server Error'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
